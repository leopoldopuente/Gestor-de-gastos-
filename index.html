<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gastos del Mes</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #08080f; color: #e8e4dc; font-family: Georgia, serif; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }
    button { font-family: Georgia, serif; cursor: pointer; }
    input { font-family: Georgia, serif; }

    #app { min-height: 100vh; padding-bottom: 76px; }

    /* HEADER */
    #header { background: #0c0c14; border-bottom: 1px solid #1e1e2e; padding: 18px 18px 14px; position: sticky; top: 0; z-index: 10; }
    #header-label { font-size: 10px; color: #6a6880; letter-spacing: 3px; font-family: monospace; text-transform: uppercase; margin-bottom: 10px; }
    #header-nav { display: flex; align-items: center; justify-content: space-between; }
    .nav-btn { background: #111118; border: 1px solid #1e1e2e; border-radius: 8px; padding: 8px 16px; color: #9896a0; font-size: 20px; line-height: 1; }
    #mes-display { text-align: center; }
    #mes-nombre { font-size: 19px; color: #e8e4dc; }
    #mes-total { font-size: 13px; color: #9896a0; font-family: monospace; margin-top: 3px; }

    /* SAVING BAR */
    #saving-bar { background: #1a1a2a; padding: 8px 16px; text-align: center; font-size: 12px; color: #9896a0; font-family: monospace; display: none; }

    /* CONTENT */
    #content { padding: 18px 16px; }

    /* BOTTOM NAV */
    #bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #0c0c14; border-top: 1px solid #1e1e2e; display: flex; align-items: center; height: 66px; z-index: 20; padding: 0 8px; }
    .tab-btn { flex: 1; background: none; border: none; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 8px 0; color: #9896a0; }
    .tab-btn.active { color: #a78bfa; }
    .tab-icon { font-size: 18px; }
    .tab-label { font-size: 10px; letter-spacing: 1.5px; font-family: monospace; text-transform: uppercase; }
    #fab { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #4f46e5, #7c3aed); border: none; color: #fff; font-size: 28px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(124,58,237,0.5); flex-shrink: 0; margin-left: 8px; }

    /* CARDS */
    .card { background: #111118; border: 1px solid #1e1e2e; border-radius: 12px; }
    .section-title { font-size: 11px; color: #9896a0; letter-spacing: 2px; font-family: monospace; text-transform: uppercase; margin-bottom: 10px; }

    /* TOTAL CARD */
    #total-card { border-radius: 14px; padding: 20px; margin-bottom: 20px; }
    #total-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 16px; }
    #total-grid.single { grid-template-columns: 1fr; }
    .total-label { font-size: 11px; color: #9896a0; letter-spacing: 2px; font-family: monospace; margin-bottom: 6px; }
    .total-amount { font-size: 30px; letter-spacing: -1px; }
    #progress-bar-bg { height: 5px; background: #1a1a2a; border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
    #progress-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
    #progress-info { display: flex; justify-content: space-between; font-size: 12px; font-family: monospace; color: #9896a0; }

    /* CATEGORIA ITEMS */
    .cat-item { padding: 14px 16px; margin-bottom: 8px; }
    .cat-row { display: flex; justify-content: space-between; align-items: center; }
    .cat-left { display: flex; align-items: center; gap: 9px; }
    .cat-emoji { font-size: 18px; }
    .cat-nombre { font-size: 14px; color: #e8e4dc; }
    .cat-amounts { text-align: right; }
    .cat-gastado { font-family: monospace; font-size: 14px; }
    .cat-budget { font-family: monospace; font-size: 12px; color: #9896a0; }
    .cat-bar-bg { height: 4px; background: #1e1e2e; border-radius: 2px; overflow: hidden; margin-top: 10px; }
    .cat-bar-fill { height: 100%; border-radius: 2px; }

    /* MEDIO ITEMS */
    .medio-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; }
    .medio-item + .medio-item { border-top: 1px solid #1e1e2e; }
    .medio-left { display: flex; align-items: center; gap: 10px; }
    .medio-dot { width: 9px; height: 9px; border-radius: 50%; }
    .medio-nombre { font-size: 14px; color: #e8e4dc; }
    .medio-persona { font-size: 11px; color: #9896a0; font-family: monospace; }
    .medio-monto { font-family: monospace; font-size: 14px; color: #e8e4dc; }

    /* FILTROS */
    #filtros-wrap { overflow-x: auto; padding-bottom: 8px; margin-bottom: 14px; }
    #filtros { display: flex; gap: 7px; min-width: max-content; }
    .filtro-btn { padding: 7px 14px; border-radius: 20px; font-size: 13px; border: 1px solid #252535; background: #111118; color: #9896a0; white-space: nowrap; }
    .filtro-btn.active { border-color: #818cf8; background: rgba(129,140,248,0.12); color: #818cf8; }

    /* GASTO ITEMS */
    .gasto-item { padding: 13px 14px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 12px; }
    .gasto-emoji-box { width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 19px; }
    .gasto-body { flex: 1; min-width: 0; }
    .gasto-desc { font-size: 15px; color: #e8e4dc; margin-bottom: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .gasto-meta { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
    .gasto-fecha { font-size: 12px; color: #9896a0; font-family: monospace; }
    .gasto-sep { font-size: 11px; color: #6a6880; }
    .gasto-medio-tag { font-size: 11px; font-family: monospace; padding: 2px 7px; border-radius: 5px; }
    .gasto-persona { font-size: 12px; color: #9896a0; }
    .gasto-right { display: flex; flex-direction: column; align-items: flex-end; gap: 7px; flex-shrink: 0; }
    .gasto-monto { font-family: monospace; font-size: 15px; color: #e8e4dc; }
    .gasto-del { background: none; border: 1px solid #2a1a1a; border-radius: 5px; padding: 3px 8px; color: #7a3a3a; font-size: 12px; }
    #gastos-footer { padding: 13px 16px; margin-top: 8px; display: flex; justify-content: space-between; }
    #gastos-count { font-size: 12px; color: #9896a0; font-family: monospace; }
    #gastos-sum { font-family: monospace; font-size: 15px; color: #a78bfa; }
    #ver-mas { width: 100%; padding: 13px; font-size: 13px; font-family: monospace; color: #9896a0; margin-bottom: 8px; }
    #empty-msg { text-align: center; padding: 60px 20px; color: #9896a0; font-size: 14px; line-height: 1.8; }

    /* PRESUPUESTO */
    .presp-item { display: flex; align-items: center; justify-content: space-between; padding: 15px 16px; }
    .presp-item + .presp-item { border-top: 1px solid #1e1e2e; }
    .presp-left { display: flex; align-items: center; gap: 10px; }
    .presp-emoji { font-size: 18px; }
    .presp-nombre { font-size: 14px; color: #e8e4dc; }
    .presp-gastado { font-size: 11px; color: #9896a0; font-family: monospace; margin-top: 2px; }
    .presp-edit-btn { background: none; border: 1px solid #1e1e2e; border-radius: 8px; padding: 8px 14px; color: #9896a0; font-size: 13px; font-family: monospace; }
    .presp-edit-btn.has-val { border-color: #252535; color: #e8e4dc; }
    .presp-input-wrap { display: flex; gap: 7px; align-items: center; }
    .presp-input { width: 110px; background: #0c0c12; border-radius: 8px; padding: 9px 10px; color: #e8e4dc; font-size: 14px; font-family: monospace; outline: none; }
    .presp-ok { border: none; border-radius: 8px; padding: 9px 13px; color: #000; font-size: 14px; font-weight: bold; }
    #presp-total-row { margin-top: 12px; padding: 15px 16px; display: flex; justify-content: space-between; }
    #presp-total-label { color: #9896a0; font-family: monospace; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
    #presp-total-val { color: #e8e4dc; font-family: monospace; font-size: 15px; }

    /* FORM */
    #form-overlay { position: fixed; inset: 0; background: #08080f; z-index: 200; overflow-y: auto; display: none; flex-direction: column; }
    #form-overlay.open { display: flex; }
    #form-header { display: flex; align-items: center; gap: 14px; padding: 20px 20px 16px; border-bottom: 1px solid #1e1e2e; background: #0c0c14; position: sticky; top: 0; z-index: 10; }
    #form-back { background: #111118; border: none; border-radius: 8px; width: 38px; height: 38px; color: #9896a0; font-size: 20px; display: flex; align-items: center; justify-content: center; }
    #form-title { font-size: 17px; color: #e8e4dc; }
    #form-step { font-size: 11px; color: #9896a0; font-family: monospace; margin-top: 2px; }
    #form-body { padding: 24px 20px 40px; display: flex; flex-direction: column; gap: 22px; flex: 1; }
    .form-label { display: block; font-size: 11px; color: #9896a0; margin-bottom: 8px; letter-spacing: 1.5px; font-family: monospace; text-transform: uppercase; }
    .form-input { width: 100%; background: #0c0c14; border: 1px solid #252535; border-radius: 10px; padding: 13px 14px; color: #e8e4dc; font-size: 16px; outline: none; appearance: none; -webkit-appearance: none; font-family: Georgia, serif; }
    #input-monto { font-family: monospace; font-size: 28px; }
    .persona-grid, .medio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .medio-grid { gap: 8px; }
    .persona-btn { padding: 18px 12px; border-radius: 12px; font-size: 16px; border: 2px solid #252535; background: #111118; color: #9896a0; }
    .persona-btn.sel { border-color: #7c3aed; background: #1e1028; color: #c4b5fd; }
    .medio-btn { padding: 15px 12px; border-radius: 12px; font-size: 15px; border: 2px solid #252535; background: #111118; color: #9896a0; }
    .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .cat-btn { padding: 11px 12px; border-radius: 10px; border: 1px solid #252535; background: #111118; color: #9896a0; text-align: left; font-size: 13px; display: flex; align-items: center; gap: 7px; overflow: hidden; }
    .cat-btn span:last-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #btn-continuar, #btn-guardar { border: none; border-radius: 12px; padding: 16px; font-size: 16px; width: 100%; margin-top: 4px; }
    #btn-continuar.ok, #btn-guardar.ok { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: #fff; }
    #btn-continuar.disabled, #btn-guardar.disabled { background: #111118; color: #6a6880; }

    /* CONFIRM */
    #confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 300; display: none; align-items: center; justify-content: center; padding: 24px; }
    #confirm-overlay.open { display: flex; }
    #confirm-box { background: #16161f; border: 1px solid #1e1e2e; border-radius: 16px; padding: 24px; max-width: 320px; width: 100%; }
    #confirm-msg { font-size: 15px; color: #e8e4dc; margin-bottom: 20px; line-height: 1.5; }
    #confirm-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    #confirm-cancel { padding: 13px; border-radius: 10px; background: #111118; border: 1px solid #252535; color: #9896a0; font-size: 14px; }
    #confirm-ok { padding: 13px; border-radius: 10px; background: #3a1a1a; border: 1px solid #5a2a2a; color: #f87171; font-size: 14px; }
  </style>
</head>
<body>

<div id="app">
  <div id="header">
    <div id="header-label">Gastos del Mes</div>
    <div id="header-nav">
      <button class="nav-btn" id="btn-prev">‹</button>
      <div id="mes-display">
        <div id="mes-nombre">—</div>
        <div id="mes-total" style="display:none"></div>
      </div>
      <button class="nav-btn" id="btn-next">›</button>
    </div>
  </div>

  <div id="saving-bar">Guardando...</div>
  <div id="content"></div>

  <div id="bottom-nav">
    <button class="tab-btn active" data-tab="resumen">
      <span class="tab-icon">▦</span>
      <span class="tab-label">Resumen</span>
    </button>
    <button class="tab-btn" data-tab="gastos">
      <span class="tab-icon">≡</span>
      <span class="tab-label">Gastos</span>
    </button>
    <button class="tab-btn" data-tab="presupuesto">
      <span class="tab-icon">◎</span>
      <span class="tab-label">Presupuesto</span>
    </button>
    <button id="fab">+</button>
  </div>
</div>

<!-- FORM OVERLAY -->
<div id="form-overlay">
  <div id="form-header">
    <button id="form-back">←</button>
    <div>
      <div id="form-title">Nuevo gasto</div>
      <div id="form-step">Paso 1 de 2 — ¿Cuánto y qué?</div>
    </div>
  </div>
  <div id="form-body">
    <div id="paso0">
      <div style="margin-bottom:22px">
        <label class="form-label">Descripción</label>
        <input id="input-desc" class="form-input" placeholder="ej: Coto, Farmacity, YPF..." />
      </div>
      <div style="margin-bottom:22px">
        <label class="form-label">Monto ($)</label>
        <input id="input-monto" class="form-input" type="number" placeholder="0" />
      </div>
      <div style="margin-bottom:22px">
        <label class="form-label">Fecha</label>
        <input id="input-fecha" class="form-input" type="date" />
      </div>
      <button id="btn-continuar" class="disabled">Continuar →</button>
    </div>
    <div id="paso1" style="display:none">
      <div style="margin-bottom:22px">
        <label class="form-label">¿Quién gasta?</label>
        <div class="persona-grid" id="persona-grid"></div>
      </div>
      <div id="medio-section" style="display:none;margin-bottom:22px">
        <label class="form-label">¿Cómo paga?</label>
        <div class="medio-grid" id="medio-grid"></div>
      </div>
      <div id="cat-section" style="display:none;margin-bottom:22px">
        <label class="form-label">Categoría</label>
        <div class="cat-grid" id="cat-grid"></div>
      </div>
      <button id="btn-guardar" class="disabled">Guardar gasto ✓</button>
    </div>
  </div>
</div>

<!-- CONFIRM OVERLAY -->
<div id="confirm-overlay">
  <div id="confirm-box">
    <div id="confirm-msg"></div>
    <div id="confirm-btns">
      <button id="confirm-cancel">Cancelar</button>
      <button id="confirm-ok">Eliminar</button>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCSdbsxo7TGpETI_hSWHMJwyStiJgxqFyU",
  authDomain: "gestor-de-gastos-30e2e.firebaseapp.com",
  databaseURL: "https://gestor-de-gastos-30e2e-default-rtdb.firebaseio.com",
  projectId: "gestor-de-gastos-30e2e",
  storageBucket: "gestor-de-gastos-30e2e.firebasestorage.app",
  messagingSenderId: "299639577699",
  appId: "1:299639577698:web:aa716c7d8a409c7675453b"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const CATEGORIAS = [
  { nombre:"Supermercado",        emoji:"🛒", color:"#4ade80" },
  { nombre:"Almacén / Dietética", emoji:"🥦", color:"#86efac" },
  { nombre:"Indumentaria / Ropa", emoji:"👕", color:"#a78bfa" },
  { nombre:"Farmacia / Salud",    emoji:"💊", color:"#f87171" },
  { nombre:"Mascotas",            emoji:"🐾", color:"#fb923c" },
  { nombre:"Restaurante",         emoji:"🍽️", color:"#f0b429" },
  { nombre:"Entretenimiento",     emoji:"🎬", color:"#60a5fa" },
  { nombre:"Educación / Libros",  emoji:"📚", color:"#34d399" },
  { nombre:"Hogar",               emoji:"🏠", color:"#c084fc" },
  { nombre:"Transporte",          emoji:"🚗", color:"#94a3b8" },
  { nombre:"Seguros",             emoji:"🛡️", color:"#f472b6" },
  { nombre:"Servicios",           emoji:"📱", color:"#38bdf8" },
  { nombre:"Otros",               emoji:"📦", color:"#9ca3af" },
];

const MEDIOS = [
  { label:"VISA",          color:"#6366f1" },
  { label:"Mastercard",    color:"#ef4444" },
  { label:"Transferencia", color:"#06b6d4" },
  { label:"Efectivo",      color:"#22c55e" },
];

const PERSONAS = ["Leopoldo","Valeria"];
const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

function getCat(n) { return CATEGORIAS.find(c=>c.nombre===n)||CATEGORIAS[CATEGORIAS.length-1]; }
function getMedio(l) { return MEDIOS.find(m=>m.label===l)||MEDIOS[0]; }
function fmt(n) { return "$"+Math.round(n).toLocaleString("es-AR"); }
function fmtDate(s) { if(!s) return ""; const [,m,d]=s.split("-"); return `${d}/${m}`; }
function todayStr() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function monthKey(y,m) { if(y===undefined){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;} return `${y}-${String(m).padStart(2,"0")}`; }
function addMonth(key,delta) { const [y,m]=key.split("-").map(Number); const d=new Date(y,m-1+delta,1); return monthKey(d.getFullYear(),d.getMonth()+1); }
function formatMonth(key) { const [y,m]=key.split("-").map(Number); return MESES[m-1]+" "+y; }

// State
let mes = monthKey();
let gastos = [];
let presupuesto = {};
let tab = "resumen";
let filtroCat = "Todas";
let gastosVisibles = 30;
let confirmId = null;
let formPaso = 0;
let formData = {};
let editandoCat = null;
let unsub1=null, unsub2=null;

// Firebase
async function fbSet(path, data) { try { await db.ref(path).set(data); } catch(e) { console.error(e); } }

// Subscribe to Firebase
function subscribe() {
  if(unsub1) { db.ref(`gastos_data/${mes}`).off("value",unsub1); }
  if(unsub2) { db.ref(`presupuesto_data/${mes}`).off("value",unsub2); }
  document.getElementById("content").innerHTML = '<div style="text-align:center;padding:80px;color:#9896a0;font-family:monospace;font-size:14px">Cargando...</div>';
  unsub1 = db.ref(`gastos_data/${mes}`).on("value", snap => {
    const v = snap.val();
    gastos = v ? JSON.parse(v) : [];
    render();
  });
  unsub2 = db.ref(`presupuesto_data/${mes}`).on("value", snap => {
    const v = snap.val();
    presupuesto = v ? JSON.parse(v) : {};
    render();
  });
}

// RENDER
function render() {
  updateHeader();
  if(tab==="resumen") renderResumen();
  else if(tab==="gastos") renderGastos();
  else renderPresupuesto();
}

function updateHeader() {
  document.getElementById("mes-nombre").textContent = formatMonth(mes);
  const total = gastos.reduce((s,g)=>s+g.monto,0);
  const el = document.getElementById("mes-total");
  if(total>0) { el.style.display="block"; el.textContent=fmt(total)+" gastado"; }
  else { el.style.display="none"; }
}

function renderResumen() {
  const totalGastado = gastos.reduce((s,g)=>s+g.monto,0);
  const totalPresup = Object.values(presupuesto).reduce((s,v)=>s+(v||0),0);
  const over = totalPresup>0 && totalGastado>totalPresup;
  const pct = totalPresup>0 ? Math.min(100,(totalGastado/totalPresup)*100) : 0;

  const porCat = {};
  gastos.forEach(g=>{ porCat[g.categoria]=(porCat[g.categoria]||0)+g.monto; });
  const porMedio = {};
  gastos.forEach(g=>{ const k=g.persona+"|||"+g.medioPago; porMedio[k]=(porMedio[k]||0)+g.monto; });

  let html = "";

  // Total card
  const bg = over ? "#120a0a" : "#0d1210";
  const bc = over ? "#3a1a1a" : "#1a2e20";
  html += `<div id="total-card" style="background:${bg};border:1px solid ${bc}">`;
  html += `<div id="total-grid" class="${totalPresup>0?'':'single'}">`;
  html += `<div><div class="total-label">GASTADO</div><div class="total-amount" style="color:${over?'#f87171':'#4ade80'}">${fmt(totalGastado)}</div></div>`;
  if(totalPresup>0) html += `<div><div class="total-label">PRESUPUESTO</div><div class="total-amount" style="color:#9896a0">${fmt(totalPresup)}</div></div>`;
  html += `</div>`;
  if(totalPresup>0) {
    html += `<div id="progress-bar-bg"><
