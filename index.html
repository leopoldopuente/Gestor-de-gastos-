<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const CATEGORIAS = [
  { nombre: "Supermercado",        emoji: "🛒", color: "#4ade80" },
  { nombre: "Almacén / Dietética", emoji: "🥦", color: "#86efac" },
  { nombre: "Indumentaria / Ropa", emoji: "👕", color: "#a78bfa" },
  { nombre: "Farmacia / Salud",    emoji: "💊", color: "#f87171" },
  { nombre: "Mascotas",            emoji: "🐾", color: "#fb923c" },
  { nombre: "Restaurante",         emoji: "🍽️", color: "#f0b429" },
  { nombre: "Entretenimiento",     emoji: "🎬", color: "#60a5fa" },
  { nombre: "Educación / Libros",  emoji: "📚", color: "#34d399" },
  { nombre: "Hogar",               emoji: "🏠", color: "#c084fc" },
  { nombre: "Transporte",          emoji: "🚗", color: "#94a3b8" },
  { nombre: "Seguros",             emoji: "🛡️", color: "#f472b6" },
  { nombre: "Servicios",           emoji: "📱", color: "#38bdf8" },
  { nombre: "Otros",               emoji: "📦", color: "#9ca3af" },
];

const MEDIOS = [
  { label: "VISA",          color: "#6366f1" },
  { label: "Mastercard",    color: "#ef4444" },
  { label: "Transferencia", color: "#06b6d4" },
  { label: "Efectivo",      color: "#22c55e" },
];

const PERSONAS = ["Leopoldo", "Valeria"];

const C = {
  bg:        "#08080f",
  surface:   "#111118",
  border:    "#1e1e2e",
  border2:   "#252535",
  text:      "#e8e4dc",
  textSub:   "#9896a0",
  textMuted: "#6a6880",
  accent:    "#7c3aed",
};

function getCat(nombre) { return CATEGORIAS.find(c => c.nombre === nombre) || CATEGORIAS[CATEGORIAS.length - 1]; }
function getMedio(label) { return MEDIOS.find(m => m.label === label) || MEDIOS[0]; }

function monthKey(y, m) {
  if (y === undefined) { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; }
  return `${y}-${String(m).padStart(2,"0")}`;
}
function addMonth(key, delta) {
  const [y, m] = key.split("-").map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  return monthKey(d.getFullYear(), d.getMonth() + 1);
}
function formatMonth(key) {
  const [y, m] = key.split("-").map(Number);
  return ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"][m-1] + " " + y;
}
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function fmt(n) { return "$" + Math.round(n).toLocaleString("es-AR"); }
function fmtDate(s) {
  if (!s) return "";
  const [,m,d] = s.split("-");
  return `${d}/${m}`;
}

// Firebase helpers
async function fbSet(path, data) {
  try { await db.ref(path).set(data); return true; }
  catch(e) { console.error(e); return false; }
}
async function fbRemove(path) {
  try { await db.ref(path).remove(); return true; }
  catch(e) { console.error(e); return false; }
}

// ─── FORM NUEVO GASTO ────────────────────────────────────────
function FormGasto({ onSave, onCancel }) {
  const [paso, setPaso] = useState(0);
  const [form, setForm] = useState({
    fecha: todayStr(), descripcion: "", categoria: CATEGORIAS[0].nombre,
    monto: "", medioPago: "", persona: "",
  });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const paso0ok = form.descripcion.trim() && form.monto && parseFloat(form.monto) > 0;
  const paso1ok = form.persona && form.medioPago && form.categoria;

  function handleSave() {
    if (!paso1ok) return;
    onSave({ id: Date.now().toString(), ...form, monto: parseFloat(form.monto) });
  }

  const inp = {
    width: "100%", background: "#0c0c14", border: `1px solid ${C.border2}`,
    borderRadius: 10, padding: "13px 14px", color: C.text, fontSize: 16,
    outline: "none", appearance: "none", WebkitAppearance: "none",
  };
  const lbl = {
    display: "block", fontSize: 11, color: C.textSub, marginBottom: 8,
    letterSpacing: 1.5, fontFamily: "monospace", textTransform: "uppercase",
  };

  return (
    <div style={{ position:"fixed", inset:0, background:C.bg, zIndex:200, overflowY:"auto", display:"flex", flexDirection:"column" }}>
      <div style={{ display:"flex", alignItems:"center", gap:14, padding:"20px 20px 16px", borderBottom:`1px solid ${C.border}`, background:"#0c0c14", position:"sticky", top:0, zIndex:10 }}>
        <button onClick={paso === 0 ? onCancel : () => setPaso(0)} style={{ background:C.surface, border:"none", borderRadius:8, width:38, height:38, color:C.textSub, cursor:"pointer", fontSize:20, display:"flex", alignItems:"center", justifyContent:"center" }}>←</button>
        <div>
          <div style={{ fontSize:17, color:C.text }}>Nuevo gasto</div>
          <div style={{ fontSize:11, color:C.textSub, fontFamily:"monospace", marginTop:2 }}>
            {paso === 0 ? "Paso 1 de 2 — ¿Cuánto y qué?" : "Paso 2 de 2 — ¿Quién y cómo?"}
          </div>
        </div>
      </div>

      <div style={{ padding:"24px 20px 40px", display:"flex", flexDirection:"column", gap:22, flex:1 }}>
        {paso === 0 && (<>
          <div>
            <label style={lbl}>Descripción</label>
            <input value={form.descripcion} onChange={e => set("descripcion", e.target.value)}
              placeholder="ej: Coto, Farmacity, YPF..." style={inp} autoFocus />
          </div>
          <div>
            <label style={lbl}>Monto ($)</label>
            <input type="number" value={form.monto} onChange={e => set("monto", e.target.value)}
              placeholder="0" style={{ ...inp, fontFamily:"monospace", fontSize:28 }} />
          </div>
          <div>
            <label style={lbl}>Fecha</label>
            <input type="date" value={form.fecha} onChange={e => set("fecha", e.target.value)} style={inp} />
          </div>
          <button onClick={() => paso0ok && setPaso(1)} style={{
            background: paso0ok ? "linear-gradient(135deg,#4f46e5,#7c3aed)" : C.surface,
            border:"none", borderRadius:12, padding:"16px",
            color: paso0ok ? "#fff" : C.textMuted, fontSize:16,
            cursor: paso0ok ? "pointer" : "default", marginTop:4,
          }}>Continuar →</button>
        </>)}

        {paso === 1 && (<>
          <div>
            <label style={lbl}>¿Quién gasta?</label>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              {PERSONAS.map(p => (
                <button key={p} onClick={() => set("persona", p)} style={{
                  padding:"18px 12px", borderRadius:12, fontSize:16, cursor:"pointer",
                  border:`2px solid ${form.persona === p ? C.accent : C.border2}`,
                  background: form.persona === p ? "#1e1028" : C.surface,
                  color: form.persona === p ? "#c4b5fd" : C.textSub,
                }}>{p}</button>
              ))}
            </div>
          </div>

          {form.persona && (
            <div>
              <label style={lbl}>¿Cómo paga?</label>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                {MEDIOS.map(m => (
                  <button key={m.label} onClick={() => set("medioPago", m.label)} style={{
                    padding:"15px 12px", borderRadius:12, cursor:"pointer", fontSize:15,
                    border:`2px solid ${form.medioPago === m.label ? m.color : C.border2}`,
                    background: form.medioPago === m.label ? m.color+"18" : C.surface,
                    color: form.medioPago === m.label ? m.color : C.textSub,
                  }}>{m.label}</button>
                ))}
              </div>
            </div>
          )}

          {form.persona && form.medioPago && (
            <div>
              <label style={lbl}>Categoría</label>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                {CATEGORIAS.map(c => (
                  <button key={c.nombre} onClick={() => set("categoria", c.nombre)} style={{
                    padding:"11px 12px", borderRadius:10, cursor:"pointer",
                    border:`1px solid ${form.categoria === c.nombre ? c.color : C.border2}`,
                    background: form.categoria === c.nombre ? c.color+"18" : C.surface,
                    color: form.categoria === c.nombre ? c.color : C.textSub,
                    textAlign:"left", fontSize:13, display:"flex", alignItems:"center", gap:7,
                  }}>
                    <span>{c.emoji}</span>
                    <span style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{c.nombre}</span>
                  </button>
                ))}
              </div>
            </div>
          )}

          <button onClick={() => paso1ok && handleSave()} style={{
            background: paso1ok ? "linear-gradient(135deg,#4f46e5,#7c3aed)" : C.surface,
            border:"none", borderRadius:12, padding:"16px",
            color: paso1ok ? "#fff" : C.textMuted, fontSize:16,
            cursor: paso1ok ? "pointer" : "default", marginTop:4,
          }}>Guardar gasto ✓</button>
        </>)}
      </div>
    </div>
  );
}

// ─── CONFIRM DIALOG ──────────────────────────────────────────
function Confirm({ mensaje, onOk, onCancel }) {
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", zIndex:300, display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
      <div style={{ background:"#16161f", border:`1px solid ${C.border}`, borderRadius:16, padding:24, maxWidth:320, width:"100%" }}>
        <div style={{ fontSize:15, color:C.text, marginBottom:20, lineHeight:1.5 }}>{mensaje}</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
          <button onClick={onCancel} style={{ padding:"13px", borderRadius:10, background:C.surface, border:`1px solid ${C.border2}`, color:C.textSub, cursor:"pointer", fontSize:14 }}>Cancelar</button>
          <button onClick={onOk} style={{ padding:"13px", borderRadius:10, background:"#3a1a1a", border:"1px solid #5a2a2a", color:"#f87171", cursor:"pointer", fontSize:14 }}>Eliminar</button>
        </div>
      </div>
    </div>
  );
}

// ─── APP PRINCIPAL ───────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("resumen");
  const [mes, setMes] = useState(monthKey());
  const [gastos, setGastos] = useState([]);
  const [presupuesto, setPresupuesto] = useState({});
  const [loading, setLoading] = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [editandoCat, setEditandoCat] = useState(null);
  const [editVal, setEditVal] = useState("");
  const [gastosVisibles, setGastosVisibles] = useState(30);
  const [filtroCat, setFiltroCat] = useState("Todas");
  const [confirmId, setConfirmId] = useState(null);
  const [saving, setSaving] = useState(false);

  // Firebase real-time listeners
  useEffect(() => {
    setLoading(true);
    setFiltroCat("Todas");
    setGastosVisibles(30);

    const gRef = db.ref(`gastos_data/${mes}`);
    const pRef = db.ref(`presupuesto_data/${mes}`);

    const onGastos = (snap) => {
      const val = snap.val();
      setGastos(val ? JSON.parse(val) : []);
      setLoading(false);
    };
    const onPresp = (snap) => {
      const val = snap.val();
      setPresupuesto(val ? JSON.parse(val) : {});
    };

    gRef.on("value", onGastos);
    pRef.on("value", onPresp);

    return () => {
      gRef.off("value", onGastos);
      pRef.off("value", onPresp);
    };
  }, [mes]);

  async function addGasto(g) {
    setSaving(true);
    const nuevo = [...gastos, g];
    await fbSet(`gastos_data/${mes}`, JSON.stringify(nuevo));
    setSaving(false);
    setShowForm(false);
  }

  async function removeGasto(id) {
    const nuevo = gastos.filter(g => g.id !== id);
    await fbSet(`gastos_data/${mes}`, JSON.stringify(nuevo));
    setConfirmId(null);
  }

  async function saveBudget(cat, val) {
    const nuevo = { ...presupuesto, [cat]: val || 0 };
    await fbSet(`presupuesto_data/${mes}`, JSON.stringify(nuevo));
    setEditandoCat(null);
  }

  const totalGastado     = useMemo(() => gastos.reduce((s, g) => s + g.monto, 0), [gastos]);
  const totalPresupuesto = useMemo(() => Object.values(presupuesto).reduce((s, v) => s + (v || 0), 0), [presupuesto]);

  const porCategoria = useMemo(() => {
    const m = {};
    gastos.forEach(g => { m[g.categoria] = (m[g.categoria] || 0) + g.monto; });
    return m;
  }, [gastos]);

  const porMedio = useMemo(() => {
    const m = {};
    gastos.forEach(g => {
      const k = `${g.persona}|||${g.medioPago}`;
      m[k] = (m[k] || 0) + g.monto;
    });
    return m;
  }, [gastos]);

  const gastosOrdenados = useMemo(() =>
    [...gastos]
      .filter(g => filtroCat === "Todas" || g.categoria === filtroCat)
      .sort((a, b) => b.fecha.localeCompare(a.fecha)),
    [gastos, filtroCat]
  );

  const pctTotal   = totalPresupuesto > 0 ? Math.min(100, (totalGastado / totalPresupuesto) * 100) : 0;
  const overBudget = totalPresupuesto > 0 && totalGastado > totalPresupuesto;

  const TABS = [
    { id:"resumen",     label:"Resumen",     icon:"▦" },
    { id:"gastos",      label:"Gastos",      icon:"≡" },
    { id:"presupuesto", label:"Presupuesto", icon:"◎" },
  ];

  if (showForm) return <FormGasto onSave={addGasto} onCancel={() => setShowForm(false)} />;

  const gastoParaBorrar = gastos.find(g => g.id === confirmId);

  return (
    <div style={{ minHeight:"100vh", background:C.bg, color:C.text, fontFamily:"Georgia,serif", paddingBottom:76 }}>

      {confirmId && gastoParaBorrar && (
        <Confirm
          mensaje={`¿Eliminar "${gastoParaBorrar.descripcion}" (${fmt(gastoParaBorrar.monto)})?`}
          onOk={() => removeGasto(confirmId)}
          onCancel={() => setConfirmId(null)}
        />
      )}

      {/* HEADER */}
      <div style={{ background:"#0c0c14", borderBottom:`1px solid ${C.border}`, padding:"18px 18px 14px", position:"sticky", top:0, zIndex:10 }}>
        <div style={{ fontSize:10, color:C.textMuted, letterSpacing:3, fontFamily:"monospace", textTransform:"uppercase", marginBottom:10 }}>
          Gastos del Mes
        </div>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <button onClick={() => setMes(addMonth(mes,-1))} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:"8px 16px", color:C.textSub, cursor:"pointer", fontSize:20, lineHeight:1 }}>‹</button>
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:19, color:C.text }}>{formatMonth(mes)}</div>
            {!loading && totalGastado > 0 && (
              <div style={{ fontSize:13, color:C.textSub, fontFamily:"monospace", marginTop:3 }}>{fmt(totalGastado)} gastado</div>
            )}
          </div>
          <button onClick={() => setMes(addMonth(mes,1))} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:"8px 16px", color:C.textSub, cursor:"pointer", fontSize:20, lineHeight:1 }}>›</button>
        </div>
      </div>

      {saving && (
        <div style={{ background:"#1a1a2a", padding:"8px 16px", textAlign:"center", fontSize:12, color:C.textSub, fontFamily:"monospace" }}>
          Guardando...
        </div>
      )}

      {loading ? (
        <div style={{ textAlign:"center", padding:80, color:C.textSub, fontFamily:"monospace", fontSize:14 }}>Cargando...</div>
      ) : (
        <div style={{ padding:"18px 16px" }}>

          {/* ── RESUMEN ── */}
          {tab === "resumen" && (
            <div>
              {/* Total */}
              <div style={{ background: overBudget ? "#120a0a" : "#0d1210", border:`1px solid ${overBudget?"#3a1a1a":"#1a2e20"}`, borderRadius:14, padding:"20px", marginBottom:20 }}>
                <div style={{ display:"grid", gridTemplateColumns: totalPresupuesto > 0 ? "1fr 1fr" : "1fr", gap:20, marginBottom: totalPresupuesto > 0 ? 16 : 0 }}>
                  <div>
                    <div style={{ fontSize:11, color:C.textSub, letterSpacing:2, fontFamily:"monospace", marginBottom:6 }}>GASTADO</div>
                    <div style={{ fontSize:30, color: overBudget ? "#f87171" : "#4ade80", letterSpacing:-1 }}>{fmt(totalGastado)}</div>
                  </div>
                  {totalPresupuesto > 0 && (
                    <div>
                      <div style={{ fontSize:11, color:C.textSub, letterSpacing:2, fontFamily:"monospace", marginBottom:6 }}>PRESUPUESTO</div>
                      <div style={{ fontSize:30, color:C.textSub, letterSpacing:-1 }}>{fmt(totalPresupuesto)}</div>
                    </div>
                  )}
                </div>
                {totalPresupuesto > 0 && (<>
                  <div style={{ height:5, background:"#1a1a2a", borderRadius:3, overflow:"hidden", marginBottom:8 }}>
                    <div style={{ height:"100%", borderRadius:3, width:`${pctTotal}%`, background: overBudget?"#f87171":"#4ade80", transition:"width 0.4s ease" }} />
                  </div>
                  <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, fontFamily:"monospace", color:C.textSub }}>
                    <span>{Math.round(pctTotal)}% usado</span>
                    <span style={{ color: overBudget?"#f87171":"#4ade80" }}>
                      {overBudget?"−":"+"}{fmt(Math.abs(totalPresupuesto-totalGastado))} {overBudget?"excedido":"disponible"}
                    </span>
                  </div>
                </>)}
              </div>

              {/* Por categoría */}
              {CATEGORIAS.filter(c => porCategoria[c.nombre] > 0 || presupuesto[c.nombre] > 0).length > 0 && (<>
                <div style={{ fontSize:11, color:C.textSub, letterSpacing:2, fontFamily:"monospace", textTransform:"uppercase", marginBottom:10 }}>Por categoría</div>
                <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:20 }}>
                  {CATEGORIAS
                    .filter(c => porCategoria[c.nombre] > 0 || presupuesto[c.nombre] > 0)
                    .sort((a,b) => (porCategoria[b.nombre]||0) - (porCategoria[a.nombre]||0))
                    .map(cat => {
                      const gastado = porCategoria[cat.nombre] || 0;
                      const budget  = presupuesto[cat.nombre] || 0;
