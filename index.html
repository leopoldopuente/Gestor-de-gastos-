<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gastos del Mes</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#08080f;color:#e8e4dc;font-family:Georgia,serif;min-height:100vh}
    button{font-family:Georgia,serif;cursor:pointer}
    input{font-family:Georgia,serif}
    #header{background:#0c0c14;border-bottom:1px solid #1e1e2e;padding:16px 18px;position:sticky;top:0;z-index:10}
    #header-top{font-size:10px;color:#6a6880;letter-spacing:3px;font-family:monospace;text-transform:uppercase;margin-bottom:10px}
    #header-nav{display:flex;align-items:center;justify-content:space-between}
    .nav-btn{background:#111118;border:1px solid #1e1e2e;border-radius:8px;padding:8px 16px;color:#9896a0;font-size:20px;line-height:1}
    #mes-nombre{font-size:19px;color:#e8e4dc;text-align:center}
    #mes-total{font-size:13px;color:#9896a0;font-family:monospace;text-align:center;margin-top:3px;display:none}
    #notif{padding:8px 16px;text-align:center;font-size:13px;font-family:monospace;display:none}
    #content{padding:16px}
    #botnav{position:fixed;bottom:0;left:0;right:0;background:#0c0c14;border-top:1px solid #1e1e2e;display:flex;align-items:center;height:64px;z-index:20;padding:0 6px}
    .tab{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:#9896a0;padding:6px 0}
    .tab.on{color:#a78bfa}
    .tab span:first-child{font-size:18px}
    .tab span:last-child{font-size:10px;letter-spacing:1.5px;font-family:monospace;text-transform:uppercase}
    #fab{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#4f46e5,#7c3aed);border:none;color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(124,58,237,.5);flex-shrink:0;margin-left:6px}
    .card{background:#111118;border:1px solid #1e1e2e;border-radius:12px}
    .stit{font-size:11px;color:#9896a0;letter-spacing:2px;font-family:monospace;text-transform:uppercase;margin-bottom:10px}
    /* form */
    #foverlay{position:fixed;inset:0;background:#08080f;z-index:200;overflow-y:auto;display:none;flex-direction:column}
    #foverlay.on{display:flex}
    #fhead{display:flex;align-items:center;gap:14px;padding:18px 18px 14px;border-bottom:1px solid #1e1e2e;background:#0c0c14;position:sticky;top:0}
    #fback{background:#111118;border:none;border-radius:8px;width:38px;height:38px;color:#9896a0;font-size:20px;display:flex;align-items:center;justify-content:center}
    #fbody{padding:22px 18px 40px;display:flex;flex-direction:column;gap:20px;flex:1}
    .flbl{display:block;font-size:11px;color:#9896a0;margin-bottom:7px;letter-spacing:1.5px;font-family:monospace;text-transform:uppercase}
    .finp{width:100%;background:#0c0c14;border:1px solid #252535;border-radius:10px;padding:12px 14px;color:#e8e4dc;font-size:16px;outline:none;-webkit-appearance:none;font-family:Georgia,serif}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .pbtn{padding:16px 10px;border-radius:12px;font-size:15px;border:2px solid #252535;background:#111118;color:#9896a0}
    .pbtn.on{border-color:#7c3aed;background:#1e1028;color:#c4b5fd}
    .mbtn{padding:13px 10px;border-radius:12px;font-size:14px;border:2px solid #252535;background:#111118;color:#9896a0}
    .cbtn{padding:10px;border-radius:10px;border:1px solid #252535;background:#111118;color:#9896a0;text-align:left;font-size:12px;display:flex;align-items:center;gap:6px;overflow:hidden}
    .cbtn span:last-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    #fcont,#fguard{border:none;border-radius:12px;padding:15px;font-size:15px;width:100%;margin-top:4px}
    .ok{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff}
    .dis{background:#111118;color:#5a5a7a}
    /* confirm */
    #cover{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
    #cover.on{display:flex}
    #cbox{background:#16161f;border:1px solid #1e1e2e;border-radius:16px;padding:22px;max-width:300px;width:100%}
    #cmsg{font-size:14px;color:#e8e4dc;margin-bottom:18px;line-height:1.5}
    #cbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    #cno{padding:12px;border-radius:10px;background:#111118;border:1px solid #252535;color:#9896a0;font-size:14px}
    #csi{padding:12px;border-radius:10px;background:#3a1a1a;border:1px solid #5a2a2a;color:#f87171;font-size:14px}
    /* presup */
    .pedit-btn{background:none;border:1px solid #1e1e2e;border-radius:8px;padding:7px 12px;color:#9896a0;font-size:12px;font-family:monospace}
    .pedit-btn.val{border-color:#252535;color:#e8e4dc}
    .pinp{width:100px;background:#0c0c12;border-radius:8px;padding:8px 9px;color:#e8e4dc;font-size:14px;font-family:monospace;outline:none}
    .pok{border:none;border-radius:8px;padding:8px 12px;color:#000;font-size:14px;font-weight:bold}
    /* gastos */
    .gitem{padding:12px 14px;margin-bottom:7px;display:flex;align-items:flex-start;gap:11px}
    .gbox{width:38px;height:38px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px}
    .gdesc{font-size:14px;color:#e8e4dc;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .gmeta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .gdel{background:none;border:1px solid #2a1a1a;border-radius:5px;padding:3px 7px;color:#7a3a3a;font-size:11px}
    /* filtros */
    .fscroll{overflow-x:auto;padding-bottom:7px;margin-bottom:12px}
    .frow{display:flex;gap:6px;min-width:max-content}
    .ftag{padding:6px 12px;border-radius:20px;font-size:12px;border:1px solid #252535;background:#111118;color:#9896a0;white-space:nowrap}
    .ftag.on{border-color:#818cf8;background:rgba(129,140,248,.12);color:#818cf8}
  </style>
</head>
<body>

<div style="padding-bottom:76px">
  <div id="header">
    <div id="header-top">Gastos del Mes</div>
    <div id="header-nav">
      <button class="nav-btn" id="bprev">&#8249;</button>
      <div><div id="mes-nombre">Iniciando...</div><div id="mes-total"></div></div>
      <button class="nav-btn" id="bnext">&#8250;</button>
    </div>
  </div>
  <div id="notif"></div>
  <div id="content"></div>
</div>

<div id="botnav">
  <button class="tab on" data-t="resumen"><span>&#9638;</span><span>Resumen</span></button>
  <button class="tab" data-t="gastos"><span>&#8801;</span><span>Gastos</span></button>
  <button class="tab" data-t="presupuesto"><span>&#9678;</span><span>Presupuesto</span></button>
  <button id="fab">+</button>
</div>

<div id="foverlay">
  <div id="fhead">
    <button id="fback">&#8592;</button>
    <div>
      <div id="ftitle" style="font-size:16px;color:#e8e4dc">Nuevo gasto</div>
      <div id="fstep" style="font-size:11px;color:#9896a0;font-family:monospace;margin-top:2px">Paso 1 de 2</div>
    </div>
  </div>
  <div id="fbody">
    <div id="fp0">
      <div style="margin-bottom:18px"><label class="flbl">Descripcion</label><input id="idesc" class="finp" placeholder="ej: Coto, Farmacity..."></div>
      <div style="margin-bottom:18px"><label class="flbl">Monto ($)</label><input id="imonto" class="finp" type="number" placeholder="0" style="font-family:monospace;font-size:26px"></div>
      <div style="margin-bottom:18px"><label class="flbl">Fecha</label><input id="ifecha" class="finp" type="date"></div>
      <button id="fcont" class="dis">Continuar</button>
    </div>
    <div id="fp1" style="display:none">
      <div style="margin-bottom:18px"><label class="flbl">Quien gasta?</label><div class="g2" id="pgrid"></div></div>
      <div id="msec" style="display:none;margin-bottom:18px"><label class="flbl">Como paga?</label><div class="g2" id="mgrid"></div></div>
      <div id="csec" style="display:none;margin-bottom:18px"><label class="flbl">Categoria</label><div class="g2" id="cgrid"></div></div>
      <button id="fguard" class="dis">Guardar gasto</button>
    </div>
  </div>
</div>

<div id="cover">
  <div id="cbox">
    <div id="cmsg"></div>
    <div id="cbtns"><button id="cno">Cancelar</button><button id="csi">Eliminar</button></div>
  </div>
</div>

<script>
// Captura de errores global - lo primero
window.onerror = function(msg, src, line) {
  document.getElementById("mes-nombre").textContent = "Error JS";
  notif("ERROR: " + msg + " (linea " + line + ")", "#f87171");
  return false;
};
window.onunhandledrejection = function(e) {
  notif("Error async: " + e.reason, "#f87171");
};

// Firebase REST
var DB = "https://gestor-de-gastos-30e2e-default-rtdb.firebaseio.com";
function dbGet(path) {
  return fetch(DB + "/" + path + ".json")
    .then(function(r) {
      if (!r.ok) return r.text().then(function(t) { throw new Error("HTTP " + r.status + ": " + t); });
      return r.json();
    });
}
function dbPut(path, data) {
  return fetch(DB + "/" + path + ".json", {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  }).then(function(r) {
    if (!r.ok) return r.text().then(function(t) { throw new Error("HTTP " + r.status + ": " + t); });
    return r.json();
  });
}

// Datos - sin emojis en JS para evitar problemas de encoding
var CATS = [
  {n:"Supermercado",      e:"\uD83D\uDED2", c:"#4ade80"},
  {n:"Almacen",          e:"\uD83E\uDD66", c:"#86efac"},
  {n:"Indumentaria",     e:"\uD83D\uDC55", c:"#a78bfa"},
  {n:"Farmacia / Salud", e:"\uD83D\uDC8A", c:"#f87171"},
  {n:"Mascotas",         e:"\uD43E\uDC3E", c:"#fb923c"},
  {n:"Restaurante",      e:"\uD83C\uDF7D", c:"#f0b429"},
  {n:"Entretenimiento",  e:"\uD83C\uDFAC", c:"#60a5fa"},
  {n:"Educacion",        e:"\uD83D\uDCDA", c:"#34d399"},
  {n:"Hogar",            e:"\uD83C\uDFE0", c:"#c084fc"},
  {n:"Transporte",       e:"\uD83D\uDE97", c:"#94a3b8"},
  {n:"Seguros",          e:"\uD83D\uDEE1", c:"#f472b6"},
  {n:"Servicios",        e:"\uD83D\uDCF1", c:"#38bdf8"},
  {n:"Otros",            e:"\uD83D\uDCE6", c:"#9ca3af"}
];

var MEDIOS = [
  {l:"VISA",          c:"#6366f1"},
  {l:"Mastercard",    c:"#ef4444"},
  {l:"Transferencia", c:"#06b6d4"},
  {l:"Efectivo",      c:"#22c55e"}
];

var MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

function gcat(n) { for(var i=0;i<CATS.length;i++) if(CATS[i].n===n) return CATS[i]; return CATS[CATS.length-1]; }
function gmedio(l) { for(var i=0;i<MEDIOS.length;i++) if(MEDIOS[i].l===l) return MEDIOS[i]; return MEDIOS[0]; }
function fmt(n) { return "$" + Math.round(n).toLocaleString("es-AR"); }
function fmtD(s) { if(!s) return ""; var p=s.split("-"); return p[2]+"/"+p[1]; }
function today() {
  var d=new Date();
  return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
}
function pad(n) { return n<10?"0"+n:""+n; }
function mesKey() {
  var d=new Date();
  return d.getFullYear()+"-"+pad(d.getMonth()+1);
}
function mesAdd(k, delta) {
  var p=k.split("-");
  var d=new Date(+p[0], +p[1]-1+delta, 1);
  return d.getFullYear()+"-"+pad(d.getMonth()+1);
}
function mesFmt(k) {
  var p=k.split("-");
  return MESES[+p[1]-1]+" "+p[0];
}

// Estado
var mes=mesKey(), gastos=[], presupuesto={}, tab="resumen";
var filtroCat="Todas", gastosVis=30, confirmId=null, editCat=null;
var fData={}, fPaso=0;

function notif(msg, color) {
  var el=document.getElementById("notif");
  el.textContent=msg; el.style.color=color||"#9896a0"; el.style.display="block";
}
function hideNotif() { document.getElementById("notif").style.display="none"; }

// Carga
function loadMes() {
  document.getElementById("mes-nombre").textContent = mesFmt(mes);
  document.getElementById("mes-total").style.display = "none";
  document.getElementById("content").innerHTML = '<div style="text-align:center;padding:70px;color:#9896a0;font-size:14px;font-family:monospace">Cargando...</div>';
  notif("Conectando con Firebase...", "#9896a0");

  Promise.all([
    dbGet("gastos_data/" + mes),
    dbGet("presupuesto_data/" + mes)
  ]).then(function(res) {
    gastos = res[0] ? JSON.parse(res[0]) : [];
    presupuesto = res[1] ? JSON.parse(res[1]) : {};
    hideNotif();
    render();
  }).catch(function(e) {
    notif("Error: " + e.message, "#f87171");
    document.getElementById("content").innerHTML =
      '<div style="text-align:center;padding:40px 16px;color:#f87171;font-family:monospace;font-size:13px;line-height:2">' +
      'Error al conectar con Firebase.<br>' + e.message + '<br><br>' +
      '<span style="color:#9896a0">Verificar reglas en Firebase console:<br>Realtime Database > Rules<br>Debe decir ".read": true</span></div>';
  });
}

function saveGastos(arr) {
  notif("Guardando...", "#9896a0");
  return dbPut("gastos_data/" + mes, JSON.stringify(arr))
    .then(function() { gastos=arr; hideNotif(); render(); })
    .catch(function(e) { notif("Error guardando: " + e.message, "#f87171"); });
}

function savePresup(obj) {
  notif("Guardando...", "#9896a0");
  return dbPut("presupuesto_data/" + mes, JSON.stringify(obj))
    .then(function() { presupuesto=obj; hideNotif(); render(); })
    .catch(function(e) { notif("Error guardando: " + e.message, "#f87171"); });
}

function render() {
  var total=0; for(var i=0;i<gastos.length;i++) total+=gastos[i].monto;
  document.getElementById("mes-nombre").textContent = mesFmt(mes);
  var mt=document.getElementById("mes-total");
  if(total>0){mt.textContent=fmt(total)+" gastado";mt.style.display="block";}
  else{mt.style.display="none";}
  if(tab==="resumen") renderResumen();
  else if(tab==="gastos") renderGastos();
  else renderPresup();
}

function renderResumen() {
  var tG=0,tP=0;
  for(var i=0;i<gastos.length;i++) tG+=gastos[i].monto;
  var pkeys=Object.keys(presupuesto);
  for(var i=0;i<pkeys.length;i++) tP+=(presupuesto[pkeys[i]]||0);
  var over=tP>0&&tG>tP;
  var pct=tP>0?Math.min(100,(tG/tP)*100):0;

  var porCat={}, porMed={};
  for(var i=0;i<gastos.length;i++){
    var g=gastos[i];
    porCat[g.categoria]=(porCat[g.categoria]||0)+g.monto;
    var mk=g.persona+"|||"+g.medioPago;
    porMed[mk]=(porMed[mk]||0)+g.monto;
  }

  var h="";
  var bg=over?"#120a0a":"#0d1210", bc=over?"#3a1a1a":"#1a2e20";
  h+='<div class="card" style="background:'+bg+';border-color:'+bc+';border-radius:14px;padding:20px;margin-bottom:18px">';
  h+='<div style="display:grid;grid-template-columns:'+(tP>0?"1fr 1fr":"1fr")+';gap:20px;margin-bottom:'+(tP>0?16:0)+'px">';
  h+='<div><div style="font-size:11px;color:#9896a0;letter-spacing:2px;font-family:monospace;margin-bottom:6px">GASTADO</div>';
  h+='<div style="font-size:28px;letter-spacing:-1px;color:'+(over?"#f87171":"#4ade80")+'">'+fmt(tG)+'</div></div>';
  if(tP>0){
    h+='<div><div style="font-size:11px;color:#9896a0;letter-spacing:2px;font-family:monospace;margin-bottom:6px">PRESUPUESTO</div>';
    h+='<div style="font-size:28px;letter-spacing:-1px;color:#9896a0">'+fmt(tP)+'</div></div>';
  }
  h+='</div>';
  if(tP>0){
    h+='<div style="height:5px;background:#1a1a2a;border-radius:3px;overflow:hidden;margin-bottom:7px">';
    h+='<div style="height:100%;border-radius:3px;width:'+pct+'%;background:'+(over?"#f87171":"#4ade80")+'"></div></div>';
    h+='<div style="display:flex;justify-content:space-between;font-size:12px;font-family:monospace;color:#9896a0">';
    h+='<span>'+Math.round(pct)+'% usado</span>';
    h+='<span style="color:'+(over?"#f87171":"#4ade80")+'">'+(over?"-":"+")+fmt(Math.abs(tP-tG))+" "+(over?"excedido":"disponible")+'</span></div>';
  }
  h+='</div>';

  var catsVis=[];
  for(var i=0;i<CATS.length;i++){var c=CATS[i];if(porCat[c.n]||presupuesto[c.n]) catsVis.push(c);}
  catsVis.sort(function(a,b){return (porCat[b.n]||0)-(porCat[a.n]||0);});
  if(catsVis.length>0){
    h+='<div class="stit">Por categoria</div>';
    for(var i=0;i<catsVis.length;i++){
      var cat=catsVis[i],gastado=porCat[cat.n]||0,budget=presupuesto[cat.n]||0;
      var p=budget>0?Math.min(100,(gastado/budget)*100):0,ov=budget>0&&gastado>budget;
      h+='<div class="card" style="padding:13px 15px;margin-bottom:7px">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:'+(budget>0?9:0)+'px">';
      h+='<div style="display:flex;align-items:center;gap:8px"><span style="font-size:17px">'+cat.e+'</span><span style="font-size:13px;color:#e8e4dc">'+cat.n+'</span></div>';
      h+='<div style="text-align:right"><span style="font-family:monospace;font-size:13px;color:'+(ov?"#f87171":"#e8e4dc")+'">'+fmt(gastado)+'</span>';
      if(budget>0) h+='<span style="font-family:monospace;font-size:11px;color:#9896a0"> / '+fmt(budget)+'</span>';
      h+='</div></div>';
      if(budget>0){h+='<div style="height:3px;background:#1e1e2e;border-radius:2px;overflow:hidden"><div style="height:100%;border-radius:2px;width:'+p+'%;background:'+(ov?"#f87171":cat.c)+'"></div></div>';}
      h+='</div>';
    }
  }

  var mkeys=Object.keys(porMed).sort(function(a,b){return porMed[b]-porMed[a];});
  if(mkeys.length>0){
    h+='<div class="stit" style="margin-top:18px">Por medio de pago</div>';
    h+='<div class="card" style="overflow:hidden">';
    for(var i=0;i<mkeys.length;i++){
      var k=mkeys[i],parts=k.split("|||"),persona=parts[0],med=parts[1],m=gmedio(med);
      h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:13px 15px;'+(i>0?"border-top:1px solid #1e1e2e":"")+'">'; 
      h+='<div style="display:flex;align-items:center;gap:9px"><div style="width:8px;height:8px;border-radius:50%;background:'+m.c+'"></div>';
      h+='<div><div style="font-size:13px;color:#e8e4dc">'+med+'</div><div style="font-size:11px;color:#9896a0;font-family:monospace">'+persona+'</div></div></div>';
      h+='<span style="font-family:monospace;font-size:13px;color:#e8e4dc">'+fmt(porMed[k])+'</span></div>';
    }
    h+='</div>';
  }

  if(gastos.length===0){
    h+='<div style="text-align:center;padding:50px 16px;color:#9896a0;font-size:14px;line-height:2">Sin gastos este mes.<br><span style="color:#818cf8">Toca + para agregar.</span></div>';
  }
  document.getElementById("content").innerHTML=h;
}

function renderGastos() {
  var porCat={};
  for(var i=0;i<gastos.length;i++) porCat[gastos[i].categoria]=(porCat[gastos[i].categoria]||0)+gastos[i].monto;
  var filt=[];
  for(var i=0;i<gastos.length;i++) if(filtroCat==="Todas"||gastos[i].categoria===filtroCat) filt.push(gastos[i]);
  filt.sort(function(a,b){return b.fecha<a.fecha?-1:1;});

  var h="";
  if(gastos.length>0){
    h+='<div class="fscroll"><div class="frow">';
    var opts=["Todas"];
    for(var i=0;i<CATS.length;i++) if(porCat[CATS[i].n]) opts.push(CATS[i].n);
    for(var i=0;i<opts.length;i++){
      var c=opts[i],cat=gcat(c),active=filtroCat===c;
      var col=c==="Todas"?"#818cf8":cat.c;
      h+='<button class="ftag'+(active?" on":"")+'" style="'+(active?"border-color:"+col+";background:"+col+"20;color:"+col:"")+'" data-f="'+c+'">'+(c==="Todas"?"Todas":cat.e+" "+c)+'</button>';
    }
    h+='</div></div>';
