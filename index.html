<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gastos del Mes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #08080f; color: #e8e4dc; font-family: Georgia, serif; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }
    button { font-family: Georgia, serif; cursor: pointer; }
    input { font-family: Georgia, serif; }
    #app { min-height: 100vh; padding-bottom: 76px; }
    #header { background: #0c0c14; border-bottom: 1px solid #1e1e2e; padding: 18px 18px 14px; position: sticky; top: 0; z-index: 10; }
    #header-label { font-size: 10px; color: #6a6880; letter-spacing: 3px; font-family: monospace; text-transform: uppercase; margin-bottom: 10px; }
    #header-nav { display: flex; align-items: center; justify-content: space-between; }
    .nav-btn { background: #111118; border: 1px solid #1e1e2e; border-radius: 8px; padding: 8px 16px; color: #9896a0; font-size: 20px; line-height: 1; }

    #mes-nombre { font-size: 19px; color: #e8e4dc; }

    #status-bar { padding: 8px 16px; text-align: center; font-size: 12px; font-family: monospace; display: none; }

    #bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #0c0c14; border-top: 1px solid #1e1e2e; display: flex; align-items: center; height: 66px; z-index: 20; padding: 0 8px; }
    .tab-btn { flex: 1; background: none; border: none; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 8px 0; color: #9896a0; }
    .tab-btn.active { color: #a78bfa; }
    .tab-icon { font-size: 18px; }
    .tab-label { font-size: 10px; letter-spacing: 1.5px; font-family: monospace; text-transform: uppercase; }
    #fab { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #4f46e5, #7c3aed); border: none; color: #fff; font-size: 28px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(124,58,237,0.5); flex-shrink: 0; margin-left: 8px; }
    .card { background: #111118; border: 1px solid #1e1e2e; border-radius: 12px; }
    .section-title { font-size: 11px; color: #9896a0; letter-spacing: 2px; font-family: monospace; text-transform: uppercase; margin-bottom: 10px; }
    .total-label { font-size: 11px; color: #9896a0; letter-spacing: 2px; font-family: monospace; margin-bottom: 6px; }
    .total-amount { font-size: 30px; letter-spacing: -1px; }
    .cat-item { padding: 14px 16px; margin-bottom: 8px; }
    .cat-row { display: flex; justify-content: space-between; align-items: center; }
    .cat-left { display: flex; align-items: center; gap: 9px; }
    .cat-bar-bg { height: 4px; background: #1e1e2e; border-radius: 2px; overflow: hidden; margin-top: 10px; }
    .cat-bar-fill { height: 100%; border-radius: 2px; }
    .medio-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; }
    .medio-item + .medio-item { border-top: 1px solid #1e1e2e; }
    #filtros-wrap { overflow-x: auto; padding-bottom: 8px; margin-bottom: 14px; }
    #filtros { display: flex; gap: 7px; min-width: max-content; }
    .filtro-btn { padding: 7px 14px; border-radius: 20px; font-size: 13px; border: 1px solid #252535; background: #111118; color: #9896a0; white-space: nowrap; }
    .filtro-btn.active { border-color: #818cf8; background: rgba(129,140,248,0.12); color: #818cf8; }
    .gasto-item { padding: 13px 14px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 12px; }
    .gasto-emoji-box { width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 19px; }
    .gasto-body { flex: 1; min-width: 0; }
    .gasto-desc { font-size: 15px; color: #e8e4dc; margin-bottom: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .gasto-meta { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
    .gasto-right { display: flex; flex-direction: column; align-items: flex-end; gap: 7px; flex-shrink: 0; }

    .gasto-del { background: none; border: 1px solid #2a1a1a; border-radius: 5px; padding: 3px 8px; color: #7a3a3a; font-size: 12px; }
    .presp-item { display: flex; align-items: center; justify-content: space-between; padding: 15px 16px; }
    .presp-item + .presp-item { border-top: 1px solid #1e1e2e; }
    .presp-left { display: flex; align-items: center; gap: 10px; }
    #form-overlay { position: fixed; inset: 0; background: #08080f; z-index: 200; overflow-y: auto; display: none; flex-direction: column; }
    #form-overlay.open { display: flex; }
    #form-header { display: flex; align-items: center; gap: 14px; padding: 20px 20px 16px; border-bottom: 1px solid #1e1e2e; background: #0c0c14; position: sticky; top: 0; z-index: 10; }
    #form-back { background: #111118; border: none; border-radius: 8px; width: 38px; height: 38px; color: #9896a0; font-size: 20px; display: flex; align-items: center; justify-content: center; }
    #form-body { padding: 24px 20px 40px; display: flex; flex-direction: column; gap: 22px; flex: 1; }
    .form-label { display: block; font-size: 11px; color: #9896a0; margin-bottom: 8px; letter-spacing: 1.5px; font-family: monospace; text-transform: uppercase; }
    .form-input { width: 100%; background: #0c0c14; border: 1px solid #252535; border-radius: 10px; padding: 13px 14px; color: #e8e4dc; font-size: 16px; outline: none; appearance: none; -webkit-appearance: none; font-family: Georgia, serif; }
    .persona-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .medio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .persona-btn { padding: 18px 12px; border-radius: 12px; font-size: 16px; border: 2px solid #252535; background: #111118; color: #9896a0; }
    .persona-btn.sel { border-color: #7c3aed; background: #1e1028; color: #c4b5fd; }
    .medio-btn { padding: 15px 12px; border-radius: 12px; font-size: 15px; border: 2px solid #252535; background: #111118; color: #9896a0; }
    .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .cat-btn { padding: 11px 12px; border-radius: 10px; border: 1px solid #252535; background: #111118; color: #9896a0; text-align: left; font-size: 13px; display: flex; align-items: center; gap: 7px; overflow: hidden; }
    .cat-btn span:last-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #btn-continuar, #btn-guardar { border: none; border-radius: 12px; padding: 16px; font-size: 16px; width: 100%; margin-top: 4px; }
    .btn-ok { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: #fff; }
    .btn-dis { background: #111118; color: #6a6880; }
    #confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 300; display: none; align-items: center; justify-content: center; padding: 24px; }
    #confirm-overlay.open { display: flex; }
    #confirm-box { background: #16161f; border: 1px solid #1e1e2e; border-radius: 16px; padding: 24px; max-width: 320px; width: 100%; }
    #confirm-msg { font-size: 15px; color: #e8e4dc; margin-bottom: 20px; line-height: 1.5; }
    #confirm-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    #confirm-cancel { padding: 13px; border-radius: 10px; background: #111118; border: 1px solid #252535; color: #9896a0; font-size: 14px; }
    #confirm-ok { padding: 13px; border-radius: 10px; background: #3a1a1a; border: 1px solid #5a2a2a; color: #f87171; font-size: 14px; }
    .presp-edit-btn { background: none; border: 1px solid #1e1e2e; border-radius: 8px; padding: 8px 14px; color: #9896a0; font-size: 13px; font-family: monospace; }
    .presp-edit-btn.has { border-color: #252535; color: #e8e4dc; }
    .presp-input-wrap { display: flex; gap: 7px; align-items: center; }
    .presp-input { width: 110px; background: #0c0c12; border-radius: 8px; padding: 9px 10px; color: #e8e4dc; font-size: 14px; font-family: monospace; outline: none; border: 1px solid #7c3aed; }
    .presp-ok { border: none; border-radius: 8px; padding: 9px 13px; color: #000; font-size: 14px; font-weight: bold; }
  </style>

<body>
<div id="app">
  <div id="header">
    <div id="header-label">Gastos del Mes</div>
    <div id="header-nav">
      <button class="nav-btn" id="btn-prev">‹</button>
      <div id="mes-display">
        <div id="mes-nombre">Cargando...</div>
        <div id="mes-total"></div>
      </div>
      <button class="nav-btn" id="btn-next">›</button>
    </div>
  </div>
  <div id="status-bar"></div>
  <div id="content"></div>
  <div id="bottom-nav">
    <button class="tab-btn active" data-tab="resumen"><span class="tab-icon">▦</span><span class="tab-label">Resumen</span></button>
    <button class="tab-btn" data-tab="gastos"><span class="tab-icon">≡</span><span class="tab-label">Gastos</span></button>
    <button class="tab-btn" data-tab="presupuesto"><span class="tab-icon">◎</span><span class="tab-label">Presupuesto</span></button>
    <button id="fab">+</button>
  </div>
</div>

<div id="form-overlay">
  <div id="form-header">
    <button id="form-back">←</button>
    <div><div id="form-title" style="font-size:17px;color:#e8e4dc">Nuevo gasto</div><div id="form-step" style="font-size:11px;color:#9896a0;font-family:monospace;margin-top:2px">Paso 1 de 2</div></div>
  </div>
  <div id="form-body">
    <div id="paso0">
      <div style="margin-bottom:22px"><label class="form-label">Descripción</label><input id="inp-desc" class="form-input" placeholder="ej: Coto, Farmacity..."></div>
      <div style="margin-bottom:22px"><label class="form-label">Monto ($)</label><input id="inp-monto" class="form-input" type="number" placeholder="0" style="font-family:monospace;font-size:28px"></div>
      <div style="margin-bottom:22px"><label class="form-label">Fecha</label><input id="inp-fecha" class="form-input" type="date"></div>
      <button id="btn-continuar" class="btn-dis">Continuar →</button>
    </div>
    <div id="paso1" style="display:none">
      <div style="margin-bottom:22px"><label class="form-label">¿Quién gasta?</label><div class="persona-grid" id="persona-grid"></div></div>
      <div id="medio-section" style="display:none;margin-bottom:22px"><label class="form-label">¿Cómo paga?</label><div class="medio-grid" id="medio-grid"></div></div>
      <div id="cat-section" style="display:none;margin-bottom:22px"><label class="form-label">Categoría</label><div class="cat-grid" id="cat-grid"></div></div>
      <button id="btn-guardar" class="btn-dis">Guardar gasto ✓</button>
    </div>
  </div>
</div>

<div id="confirm-overlay">
  <div id="confirm-box">
    <div id="confirm-msg"></div>
    <div id="confirm-btns"><button id="confirm-cancel">Cancelar</button><button id="confirm-ok">Eliminar</button></div>
  </div>
</div>

<script>
// ── FIREBASE REST API (sin SDK, sin WebSockets) ──────────────
const DB = "https://gestor-de-gastos-30e2e-default-rtdb.firebaseio.com";

async function dbGet(path) {
  const r = await fetch(`${DB}/${path}.json`);
  if (!r.ok) throw new Error(`Firebase error ${r.status}: ${await r.text()}`);
  return r.json();
}

async function dbPut(path, data) {
  const r = await fetch(`${DB}/${path}.json`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(`Firebase error ${r.status}: ${await r.text()}`);
  return r.json();
}

// ── DATOS ────────────────────────────────────────────────────
const CATS = [
  { n:"Supermercado",        e:"🛒", c:"#4ade80" },
  { n:"Almacén / Dietética", e:"🥦", c:"#86efac" },
  { n:"Indumentaria / Ropa", e:"👕", c:"#a78bfa" },
  { n:"Farmacia / Salud",    e:"💊", c:"#f87171" },
  { n:"Mascotas",            e:"🐾", c:"#fb923c" },
  { n:"Restaurante",         e:"🍽️", c:"#f0b429" },
  { n:"Entretenimiento",     e:"🎬", c:"#60a5fa" },
  { n:"Educación / Libros",  e:"📚", c:"#34d399" },
  { n:"Hogar",               e:"🏠", c:"#c084fc" },
  { n:"Transporte",          e:"🚗", c:"#94a3b8" },
  { n:"Seguros",             e:"🛡️", c:"#f472b6" },
  { n:"Servicios",           e:"📱", c:"#38bdf8" },
  { n:"Otros",               e:"📦", c:"#9ca3af" },
];
const MEDIOS = [
  { l:"VISA",          c:"#6366f1" },
  { l:"Mastercard",    c:"#ef4444" },
  { l:"Transferencia", c:"#06b6d4" },
  { l:"Efectivo",      c:"#22c55e" },
];
const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

function gcat(n) { return CATS.find(c=>c.n===n) || CATS[CATS.length-1]; }
function gmedio(l) { return MEDIOS.find(m=>m.l===l) || MEDIOS[0]; }
function fmt(n) { return "$"+Math.round(n).toLocaleString("es-AR"); }
function fmtD(s) { if(!s) return ""; const[,m,d]=s.split("-"); return `${d}/${m}`; }
function today() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function mesKey(y,m) { if(y===undefined){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;} return `${y}-${String(m).padStart(2,"0")}`; }
function mesAdd(k,d) { const[y,m]=k.split("-").map(Number);const dt=new Date(y,m-1+d,1);return mesKey(dt.getFullYear(),dt.getMonth()+1); }
function mesFmt(k) { const[y,m]=k.split("-").map(Number);return MESES[m-1]+" "+y; }

// ── ESTADO ───────────────────────────────────────────────────
let mes=mesKey(), gastos=[], presupuesto={}, tab="resumen";
let filtroCat="Todas", gastosVis=30, confirmId=null, editCat=null;
let formData={}, formPaso=0;

// ── STATUS BAR ───────────────────────────────────────────────
function showStatus(msg, color) {
  const b=document.getElementById("status-bar");
  b.textContent=msg; b.style.color=color||"#9896a0"; b.style.display="block";
}
function hideStatus() { document.getElementById("status-bar").style.display="none"; }

// ── CARGA DATOS ──────────────────────────────────────────────
async function loadMes() {
  document.getElementById("mes-nombre").textContent = mesFmt(mes);
  document.getElementById("mes-total").style.display = "none";
  document.getElementById("content").innerHTML =
    '<div style="text-align:center;padding:80px;color:#9896a0;font-family:monospace;font-size:14px">Cargando...</div>';
  showStatus("Conectando...", "#9896a0");
  try {
    const [g, p] = await Promise.all([
      dbGet(`gastos_data/${mes}`),
      dbGet(`presupuesto_data/${mes}`)
    ]);
    gastos = g ? JSON.parse(g) : [];
    presupuesto = p ? JSON.parse(p) : {};
    hideStatus();
    render();
  } catch(e) {
    showStatus("⚠ " + e.message, "#f87171");
    document.getElementById("content").innerHTML =
      `<div style="text-align:center;padding:40px 20px;font-family:monospace;font-size:13px;line-height:2;color:#f87171">
        Error al cargar datos.<br>${e.message}<br><br>
        <span style="color:#9896a0">Verificá tu conexión y las reglas<br>de Firebase (deben estar en modo prueba).</span>
      </div>`;
  }
}

// ── GUARDAR ──────────────────────────────────────────────────
async function saveGastos(arr) {
  showStatus("Guardando...", "#9896a0");
  try {
    await dbPut(`gastos_data/${mes}`, JSON.stringify(arr));
    gastos = arr;
    hideStatus();
    render();
  } catch(e) { showStatus("⚠ Error guardando: " + e.message, "#f87171"); }
}

async function savePresup(obj) {
  showStatus("Guardando...", "#9896a0");
  try {
    await dbPut(`presupuesto_data/${mes}`, JSON.stringify(obj));
    presupuesto = obj;
    hideStatus();
    render();
  } catch(e) { showStatus("⚠ Error guardando: " + e.message, "#f87171"); }
}

// ── RENDER ───────────────────────────────────────────────────
function render() {
  const total = gastos.reduce((s,g)=>s+g.monto,0);
  document.getElementById("mes-nombre").textContent = mesFmt(mes);
  const mt = document.getElementById("mes-total");
  if(total>0){ mt.textContent=fmt(total)+" gastado"; mt.style.display="block"; }
  else { mt.style.display="none"; }
  if(tab==="resumen") renderResumen();
  else if(tab==="gastos") renderGastos();
  else renderPresup();
}

function renderResumen() {
  const tG = gastos.reduce((s,g)=>s+g.monto,0);
  const tP = Object.values(presupuesto).reduce((s,v)=>s+(v||0),0);
  const over = tP>0 && tG>tP;
  const pct = tP>0 ? Math.min(100,(tG/tP)*100) : 0;
  const porCat={}, porMedio={};
  gastos.forEach(g=>{
    porCat[g.categoria]=(porCat[g.categoria]||0)+g.monto;
    const k=g.persona+"|||"+g.medioPago;
    porMedio[k]=(porMedio[k]||0)+g.monto;
  });

  let h = "";

  // Total
  h+=`<div class="card" style="background:${over?"#120a0a":"#0d1210"};border-color:${over?"#3a1a1a":"#1a2e20"};border-radius:14px;padding:20px;margin-bottom:20px">`;
  h+=`<div style="display:grid;grid-template-columns:${tP>0?"1fr 1fr":"1fr"};gap:20px;margin-bottom:${tP>0?16:0}px">`;
  h+=`<div><div class="total-label">GASTADO</div><div class="total-amount" style="color:${over?"#f87171":"#4ade80"}">${fmt(tG)}</div></div>`;
  if(tP>0) h+=`<div><div class="total-label">PRESUPUESTO</div><div class="total-amount" style="color:#9896a0">${fmt(tP)}</div></div>`;
  h+=`</div>`;
  if(tP>0){
    h+=`<div style="height:5px;background:#1a1a2a;border-radius:3px;overflow:hidden;margin-bottom:8px"><div style="height:100%;border-radius:3px;width:${pct}%;background:${over?"#f87171":"#4ade80"}"></div></div>`;
    h+=`<div style="display:flex;justify-content:space-between;font-size:12px;font-family:monospace;color:#9896a0"><span>${Math.round(pct)}% usado</span><span style="color:${over?"#f87171":"#4ade80"}">${over?"−":"+"} ${fmt(Math.abs(tP-tG))} ${over?"excedido":"disponible"}</span></div>`;
  }
  h+=`</div>`;

  // Por categoría
  const catsVis = CATS.filter(c=>porCat[c.n]>0||presupuesto[c.n]>0).sort((a,b)=>(porCat[b.n]||0)-(porCat[a.n]||0));
  if(catsVis.length>0){
    h+=`<div class="section-title">Por categoría</div>`;
    catsVis.forEach(cat=>{
      const g=porCat[cat.n]||0, b=presupuesto[cat.n]||0;
      const p=b>0?Math.min(100,(g/b)*100):0, ov=b>0&&g>b;
      h+=`<div class="card cat-item"><div class="cat-row"><div class="cat-left"><span style="font-size:18px">${cat.e}</span><span style="font-size:14px;color:#e8e4dc">${cat.n}</span></div>`;
      h+=`<div style="text-align:right"><span style="font-family:monospace;font-size:14px;color:${ov?"#f87171":"#e8e4dc"}">${fmt(g)}</span>`;
      if(b>0) h+=`<span style="font-family:monospace;font-size:12px;color:#9896a0"> / ${fmt(b)}</span>`;
      h+=`</div></div>`;
      if(b>0) h+=`<div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${p}%;background:${ov?"#f87171":cat.c}"></div></div>`;
      h+=`</div>`;
    });
  }

  // Por medio
  const medioE = Object.entries(porMedio).sort(([,a],[,b])=>b-a);
  if(medioE.length>0){
    h+=`<div class="section-title" style="margin-top:20px">Por medio de pago</div>`;
    h+=`<div class="card" style="overflow:hidden">`;
    medioE.forEach(([key,monto],i)=>{
      const[persona,med]=key.split("|||");
      const m=gmedio(med);
      h+=`<div class="medio-item" style="${i>0?"border-top:1px solid #1e1e2e":""}">`;
      h+=`<div style="display:flex;align-items:center;gap:10px"><div style="width:9px;height:9px;border-radius:50%;background:${m.c}"></div><div><div style="font-size:14px;color:#e8e4dc">${med}</div><div style="font-size:11px;color:#9896a0;font-family:monospace">${persona}</div></div></div>`;
      h+=`<span style="font-family:monospace;font-size:14px;color:#e8e4dc">${fmt(monto)}</span></div>`;
    });
    h+=`</div>`;
  }

  if(gastos.length===0){
    h+=`<div style="te
